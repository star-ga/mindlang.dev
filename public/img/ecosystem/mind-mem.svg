<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="memGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6D28D9;stop-opacity:1" />
    </linearGradient>
    <filter id="memGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="32" cy="32" r="28" fill="url(#memGradient)" opacity="0.1"/>

  <!-- Stacked memory layers -->
  <g fill="url(#memGradient)" opacity="0.7">
    <ellipse cx="32" cy="42" rx="16" ry="5"/>
    <ellipse cx="32" cy="35" rx="16" ry="5"/>
    <ellipse cx="32" cy="28" rx="16" ry="5"/>
  </g>

  <!-- Top layer highlighted -->
  <ellipse cx="32" cy="21" rx="16" ry="5" fill="url(#memGradient)" filter="url(#memGlow)"/>

  <!-- Version lines on layers -->
  <g stroke="white" stroke-width="0.8" opacity="0.6">
    <line x1="22" y1="28" x2="42" y2="28"/>
    <line x1="22" y1="35" x2="42" y2="35"/>
    <line x1="22" y1="42" x2="42" y2="42"/>
  </g>

  <!-- Central label -->
  <g fill="white" font-family="monospace" font-size="5" text-anchor="middle">
    <text x="32" y="23">MEM</text>
  </g>

  <!-- Hash chain links -->
  <g stroke="url(#memGradient)" stroke-width="1.5" fill="none" opacity="0.5">
    <path d="M48 21 L52 21 L52 42 L48 42"/>
    <circle cx="52" cy="28" r="1.5" fill="url(#memGradient)"/>
    <circle cx="52" cy="35" r="1.5" fill="url(#memGradient)"/>
  </g>
</svg>